<text x="12" y="340" font-size="13" fill="#0f172a">getIntersecting&lt;T&gt;(): List&lt;T&gt;</text>
<text x="12" y="360" font-size="13" fill="#0f172a">getOneIntersecting&lt;T&gt;(): T?</text>
