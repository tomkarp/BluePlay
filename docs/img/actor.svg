<svg xmlns="http://www.w3.org/2000/svg" width="288px" height="410px" viewBox="0 0 288 410" style="background:transparent;" font-family="'DejaVu Sans Mono','Menlo','Consolas',monospace">
<rect x="0.75" y="0.75" width="286.5" height="408.5" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
